name: 定时运行 IPTV 收集脚本

on:
  schedule:
    - cron: '30 11 * * *'   # 每天 UTC 11:30（北京时间 19:30）运行
  workflow_dispatch:        # 允许手动触发

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 运行脚本
        run: python tvcollector.py

      - name: 确保 result 目录存在
        run: mkdir -p result

      - name: 移动生成的 M3U 文件到 result 目录
        run: |
          if [ -f IPTV.m3u ]; then
            mv IPTV.m3u result/
          else
            echo "错误：IPTV.m3u 文件未生成！"
            exit 1
          fi

      - name: 配置 git 用户信息
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 提交并推送更改
        run: |
          git add result/IPTV.m3u
          # 如果没有文件变更，git diff --cached --quiet 会返回 0，则跳过提交
          if ! git diff --cached --quiet; then
            git commit -m "自动更新 IPTV.m3u [skip ci]"
            git push
          else
            echo "文件无变化，跳过提交。"
          fi